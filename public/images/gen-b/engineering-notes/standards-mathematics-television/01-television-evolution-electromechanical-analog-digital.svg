<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Television: Mechanical, Analog, Digital</title>
  <desc id="desc">A clean engineering view of how image reproduction moved from physical scanning to sampled code values.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04101d"/>
      <stop offset="0.52" stop-color="#081827"/>
      <stop offset="1" stop-color="#030812"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#102740"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2 2 L14 8 L2 14 Z" fill="#00cfff"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: url(#card); stroke: rgba(0,207,255,0.36); stroke-width: 2; filter: url(#shadow); }
      .inner { fill: rgba(255,255,255,0.045); stroke: rgba(255,255,255,0.14); stroke-width: 1.5; }
      .arrow { fill: none; stroke: #00cfff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: rgba(255,255,255,0.22); stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1920" height="1080"/>
  <circle cx="1620" cy="130" r="330" fill="#00cfff" opacity="0.055"/>
  <circle cx="200" cy="1040" r="360" fill="#1b8fff" opacity="0.055"/>
  
  <text x="90" y="86" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="3" fill="#00cfff">PRECISION BROADCAST ENGINEERING</text>
  <text x="90" y="142" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#ffffff">Television: Mechanical, Analog, Digital</text>
  <text x="90" y="184" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#c8d4e3">A clean engineering view of how image reproduction moved from physical scanning to sampled code values.</text>

  
  
  <rect class="card" x="80" y="270" width="520" height="620" rx="26"/>
  <text x="112" y="324" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#ffffff">Electromechanical</text>

  <g transform="translate(210 388)">
    <circle cx="130" cy="130" r="118" fill="#02060d" stroke="#00cfff" stroke-width="5"/>
    <circle cx="130" cy="130" r="78" fill="none" stroke="#2d9cff" stroke-width="3" opacity="0.75"/>
    <circle cx="130" cy="130" r="26" fill="#00cfff" opacity="0.85"/>
    <g fill="#dce8f5">
      <circle cx="130" cy="24" r="8"/><circle cx="183" cy="38" r="8"/><circle cx="222" cy="77" r="8"/>
      <circle cx="236" cy="130" r="8"/><circle cx="222" cy="183" r="8"/><circle cx="183" cy="222" r="8"/>
      <circle cx="130" cy="236" r="8"/><circle cx="77" cy="222" r="8"/><circle cx="38" cy="183" r="8"/>
      <circle cx="24" cy="130" r="8"/><circle cx="38" cy="77" r="8"/><circle cx="77" cy="38" r="8"/>
    </g>
    <rect x="300" y="68" width="92" height="124" rx="12" fill="#091827" stroke="#2d9cff" stroke-width="4"/>
    <circle cx="346" cy="130" r="20" fill="#00cfff"/>
    <path d="M248 130 H300" stroke="#00cfff" stroke-width="5"/>
  </g>
  <text x="112" y="720" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">A rotating scanning disc turns light into</text>
<text x="112" y="754" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">a sequential electrical signal.</text>
<text x="112" y="788" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">Timing depends on physical rotation.</text>
  
  <rect x="112" y="826" width="199" height="42" rx="21" fill="#00cfff" fill-opacity="0.13" stroke="#00cfff" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="211.5" y="854" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#00cfff">mechanical scan</text>


  <path class="arrow" d="M628 580 H720"/>

  
  <rect class="card" x="740" y="270" width="520" height="620" rx="26"/>
  <text x="772" y="324" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#ffffff">Analog Electronic</text>

  <g transform="translate(862 410)">
    <rect x="0" y="0" width="276" height="180" rx="18" fill="#02060d" stroke="#00cfff" stroke-width="5"/>
    <path d="M24 44 H252 M24 78 H252 M24 112 H252 M24 146 H252" stroke="#24445f" stroke-width="3"/>
    <path d="M24 143 C66 46 108 220 150 126 S224 36 252 106" fill="none" stroke="#00cfff" stroke-width="6" stroke-linecap="round"/>
    <rect x="28" y="20" width="32" height="18" fill="#ffffff"/>
    <rect x="62" y="20" width="32" height="18" fill="#ffd84a"/>
    <rect x="96" y="20" width="32" height="18" fill="#00d7ff"/>
    <rect x="130" y="20" width="32" height="18" fill="#40dc62"/>
    <rect x="164" y="20" width="32" height="18" fill="#ff00c8"/>
    <rect x="198" y="20" width="32" height="18" fill="#ff3b30"/>
    <rect x="232" y="20" width="20" height="18" fill="#1536ff"/>
  </g>
  <text x="772" y="720" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">Camera tube and CRT use synchronized</text>
<text x="772" y="754" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">raster scanning and continuous waveforms.</text>
<text x="772" y="788" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">Sync pulses define line and field timing.</text>
  
  <rect x="772" y="826" width="243" height="42" rx="21" fill="#2d9cff" fill-opacity="0.13" stroke="#2d9cff" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="893.5" y="854" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#2d9cff">continuous waveform</text>


  <path class="arrow" d="M1288 580 H1380"/>

  
  <rect class="card" x="1400" y="270" width="440" height="620" rx="26"/>
  <text x="1432" y="324" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#ffffff">Digital</text>

  <g transform="translate(1500 408)">
    <rect x="0" y="0" width="240" height="190" rx="18" fill="#02060d" stroke="#00cfff" stroke-width="5"/>
    <g>
      <rect x="28" y="30" width="42" height="42" fill="#ffffff"/><rect x="76" y="30" width="42" height="42" fill="#ffd84a"/>
      <rect x="124" y="30" width="42" height="42" fill="#00d7ff"/><rect x="172" y="30" width="42" height="42" fill="#40dc62"/>
      <rect x="28" y="78" width="42" height="42" fill="#ff00c8"/><rect x="76" y="78" width="42" height="42" fill="#ff3b30"/>
      <rect x="124" y="78" width="42" height="42" fill="#1536ff"/><rect x="172" y="78" width="42" height="42" fill="#101827"/>
      <text x="43" y="156" font-family="monospace" font-size="24" font-weight="700" fill="#d7e2ef">Y Cb Cr</text>
    </g>
  </g>
  <text x="1432" y="720" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">The picture becomes numeric samples:</text>
<text x="1432" y="754" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">pixels, code values, metadata and</text>
<text x="1432" y="788" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="400" fill="#d7e2ef">clocked transport.</text>
  
  <rect x="1432" y="826" width="188" height="42" rx="21" fill="#44d17a" fill-opacity="0.13" stroke="#44d17a" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="1526.0" y="854" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#44d17a">sampled values</text>


</svg>
